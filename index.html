<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casual Clicks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:            #eef3fa;
      --nav-bg:        rgba(226, 237, 252, 0.88);
      --card-bg:       #f5f8fe;
      --card-border:   rgba(50, 90, 180, 0.10);
      --text-primary:  #0b1c38;
      --text-muted:    #527099;
      --accent:        #1a4a8a;
      --divider:       rgba(50, 90, 180, 0.09);
      --toggle-bg:     #c4d8f7;
      --footer-border: rgba(50, 90, 180, 0.12);
      --transition:    0.40s cubic-bezier(0.4, 0, 0.2, 1);
      --img-filter:    brightness(1) saturate(0.92);
    }

    [data-theme="dark"] {
      --bg:            #03070e;
      --nav-bg:        rgba(3, 7, 14, 0.96);
      --card-bg:       #070d1c;
      --card-border:   rgba(70, 120, 220, 0.16);
      --text-primary:  #c8dfff;
      --text-muted:    #3f5f8a;
      --accent:        #5f96e6;
      --divider:       rgba(70, 120, 220, 0.12);
      --toggle-bg:     #0b1d3f;
      --footer-border: rgba(70, 120, 220, 0.14);
      --img-filter:    brightness(0.62) saturate(0.78);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Jost', system-ui, sans-serif;
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 60px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 0.5px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text-primary);
      text-decoration: none;
      transition: color var(--transition);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }

    .nav-links a:hover { color: var(--text-primary); }

    /* ── Toggle ── */
    .theme-toggle {
      width: 52px;
      height: 28px;
      border-radius: 14px;
      background: var(--toggle-bg);
      border: 1.5px solid var(--card-border);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition);
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.20);
    }

    [data-theme="dark"] .toggle-knob {
      transform: translateX(24px);
      background: #1b3565;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.60);
    }

    .toggle-knob svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      display: block;
      transition: opacity 0.30s;
    }

    .icon-sun  { opacity: 1; }
    .icon-moon { opacity: 0; }
    [data-theme="dark"] .icon-sun  { opacity: 0; }
    [data-theme="dark"] .icon-moon { opacity: 1; }

    .sun-ray {
      transform-origin: 6.5px 6.5px;
      animation: spin-rays 10s linear infinite;
    }
    @keyframes spin-rays { to { transform: rotate(360deg); } }

    /* ── Hero ── */
    .hero {
      padding: 3.5rem 2rem 2rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    .hero p {
      margin-top: 0.5rem;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color var(--transition);
    }

    .hero-rule {
      display: block;
      width: 36px;
      height: 1px;
      background: var(--accent);
      opacity: 0.35;
      margin: 1.2rem auto 0;
      transition: background var(--transition);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      padding: 1.5rem 2rem 4rem;
      background: var(--divider);
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      display: block;
      animation: fadeUp 0.55s ease both;
      transition: background var(--transition);
    }

    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.09s; }
    .card:nth-child(3) { animation-delay: 0.14s; }
    .card:nth-child(4) { animation-delay: 0.19s; }
    .card:nth-child(5) { animation-delay: 0.24s; }
    .card:nth-child(6) { animation-delay: 0.29s; }
    .card:nth-child(7) { animation-delay: 0.34s; }
    .card:nth-child(8) { animation-delay: 0.39s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .card-img-wrap {
      overflow: hidden;
      aspect-ratio: 4 / 3;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: var(--img-filter);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                  filter 0.55s ease;
    }

    .card:hover .card-img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.08);
    }

    .card-label {
      padding: 0.8rem 1.1rem;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--card-bg);
      transition: color var(--transition), background var(--transition);
    }

    .card:hover .card-label { color: var(--accent); }

    .view-pill {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent);
      color: var(--bg);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.28s, transform 0.28s, background var(--transition), color var(--transition);
    }

    .card:hover .view-pill {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 1.8rem;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 0.5px solid var(--footer-border);
      transition: color var(--transition), border-color var(--transition);
    }

    /* ── Social Icons ── */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 0.2rem;
      margin-bottom: 1.2rem;
    }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: var(--text-muted);
      border: 0.5px solid var(--footer-border);
      transition: color var(--transition), border-color var(--transition), background var(--transition), transform 0.2s;
      text-decoration: none;
    }

    .social-links a:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--card-bg);
      transform: translateY(-2px);
    }

    .social-links a svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    /* ── Social Icons ── */

    }

    }

    /* ── Responsive ── */

      .nav { padding: 0 1.2rem; }
      .grid { padding: 1rem 1rem 3rem; }
      .hero { padding: 2.5rem 1.2rem 1.5rem; }
    }
  </style>

  <script>
    // Persist theme across page loads
    (function () {
      const saved = localStorage.getItem('cc-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('cc-theme', next);
    }
  </script>
